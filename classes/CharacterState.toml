[properties.next_state_on_hold]
export = true
type = "bool"
value = "true"
desc = "If [code]true[/code], the player locking in the \"Hold\" button on early turns before this state ends will cause the fighter to transition to [[prop ObjectState.fallback_state]], rather than stay and continue the rest of state.\n\nHas no effect on the opponents turn unless [[prop next_state_on_hold_on_opponent_turn]] is [code]true[/code].\n"

[properties.next_state_on_hold_on_opponent_turn]
