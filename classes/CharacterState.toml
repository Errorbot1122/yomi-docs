desc = ""

[properties.interruptible_on_opponent_turn]
export = true
type = "bool"
value = "false"
desc = "If [code]true[/code], during this state's use, the player will gain interrupt turns at the same time as the opponent's interrupt turns."

[properties.update_facing_on_exit]
