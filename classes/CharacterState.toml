[properties.iasa_at]
export = true
type = "int"
value = "- 1"
desc = "The tick number (0 being when the state starts) when the player will get their next interrupt turn.\n\nNegative numbers will be converted during [[meth init]] to be that many ticks before [[prop ObjectState.anim_length]], with the default of -1 being the tick this state naturally ends.\n\nHas no effect if [[prop ObjectState.endless]] is [code]true[/code], or [[prop interrupt_into_string]] is empty.\n"

[properties.iasa_on_hit]
export = true
type = "int"
value = "- 1"
desc = "The tick number (0 being when the state starts) when the player will get their next interrupt turn if one of this state's hitboxes hits something during this state's use.\n\nNegative values have no effect.\n\nHas no effect if [[prop ObjectState.endless]] is [code]true[/code], or [[prop interrupt_into_string]] is empty.\n"

[properties.iasa_on_hit_on_block]
export = true
type = "bool"
value = "true"
desc = "Whether or not [[prop iasa_on_hit]] has any effect when hitting the opponents block."

[properties.interrupt_frames]
export = true
type = "Array"
value = "[]"
desc = "Array of tick numbers (0 being when the state starts) when the player will get additional interrupt turns.\n\nHas no effect if [[prop ObjectState.endless]] is [code]true[/code], or [[prop interrupt_into_string]] is empty.\n"

[properties.throw_techable]
